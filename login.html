<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


</head>
<body class=" container mx-auto bg-sky-100 px-[240] py-[60px] ">
    <main class="max-w-[520px] gap-10 bg-white mx-auto rounded-2xl border-0 py-5">
        <header class="gap-2 flex flex-col justify-center items-center min-h-[180px]  p-10 ">
        <img src="./assets/github-logo.png" alt="">
        <h1>GitHub Issues Tracker</h1>
        <p class="text-gray-400">Sign in to manage your issues</p>   
    </header>
    <section class="mt-0">
        <div class="px-10 space-y-3 ">
            <fieldset class="fieldset">
  <legend class="fieldset-legend font-bold">Username</legend>
  <input type="text" id="input-text" class="input w-full" placeholder="Enter Username" />
  <p class="label text-blue-800 font-bold">Default: admin</p>
</fieldset>

 <fieldset class="fieldset ">
  <legend class="fieldset-legend font-bold ">Password</legend>
  <input type="text" id="input-pass" class="input w-full" placeholder="Enter Password" />
  <p class="label text-blue-800 font-bold">Default: admin123</p>
</fieldset>
<button id="signin-btn" class="btn btn-primary w-full"> Sign in</button>
 <div class="flex w-full flex-col">
  <div class="card bg-white rounded-box grid h-2 place-items-center"></div>
  <div class="divider">OR</div>
  <div class="card bg-white rounded-box grid h-2 place-items-center"></div>
</div>
<div class="text-center space-y-4 ">
    <p class="text-gray-400">Demo Credentials:</p>
    <div class="w-full border-0 bg-gray-100 py-6 rounded ">
        <p><span class="font-bold">Username: </span><span> admin </span></p>
        <p><span class="font-bold">Password:</span><span> admin123 </span></p>
    </div>
</div>
        </div>
       </section>
    
    </main>
    
    





    <script src="./index.js/login.js"></script>
</body>
</html>
