<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
<header class="grid grid-cols-12 gap-2 max-w-[1600px] bg-white px-10">
        <div class="flex gap-2 col-span-7">
            <img src="./assets/github-logo_25231 1.png" alt="">
            <p class="font-bold">GitHub Issues Tracker</p>
        </div>
        <!-- search -->
        <div class="col-span-3">
            <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search" />
</label>
        </div>
        <div class="col-span-2">
            <button class="btn btn-active btn-primary"><span>+</span> <span>New Issue</span></button>
        </div>  
    </header>
     <section><hr></section>
    <main class="  bg-blue-300  ">
   <section class="px-[245px] ">
    <div class="bg-white border-2 rounded shadow-2xl">
        <div class="p-6">
            <button class="btn btn-neutral btn-outline">All</button>
            <button class="btn btn-neutral btn-outline">Open</button>
            <button class="btn btn-neutral btn-outline">Closed</button>
        </div>
    </div>
    <!-- issues section -->
    <section class="bg-white border-2 rounded shadow-2xl ">
        <div class="grid grid-cols-12 gap-1 max-w-[1110px]">
            <div class=" col-span-1 w-10 h-10 rounded-full bg-gray-200 items-center p-2"><img src="./assets/Aperture.png" alt=""></div>
            <div class="col-span-9">
                <h2 class="font-bold">50 Issues</h2>
                <p>Track and manage your project issues</p>
            </div>
            <div class="col-span-2">
               <button>
      <div class="avatar">
  <div class="w-3 bg-green-400 rounded-full">
  </div>
</div>
                Open</button>
               <button>
                 <div class="avatar">
  <div class="w-3 bg-purple-400 rounded-full">
  </div>
</div>
                Closed</button>
            </div>
        </div>
    </section>
</section>
    </main>






    <script src="./index.js/home.js"></script>
    
</body>
</html>
