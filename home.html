<body class=" bg-blue-100 ">
<header class="grid grid-cols-12 gap-2 max-w-[1600px] bg-white px-10">
        <div class="flex gap-2 col-span-7">
            <img src="./assets/github-logo_25231 1.png" alt="">
            <p class="font-bold">GitHub Issues Tracker</p>
        </div>
        <!-- search -->
        <div class="col-span-3">
            <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search" />
</label>
        </div>
        <div class="col-span-2">
            <button class="btn btn-active btn-primary"><span>+</span> <span>New Issue</span></button>
        </div>  
    </header>
     <section><hr></section>
    <main class=" ">
   <section class="px-[245px] mt-6 ">
    <div class="bg-white border-0 rounded  shadow-white ">
        <div class="p-6 filter-buttons">
            <button onclick="switchTab('btnAll')"  id="btnAll" class="btn btn-neutral btn-outline">All</button>
            <button onclick="switchTab('btnOpen')"  id="btnOpen"  class="btn btn-neutral btn-outline">Open</button>
            <button  onclick="switchTab('btnClosed')" id="btnClosed" class="btn btn-neutral btn-outline">Closed</button>
        </div>
    </div>
    <!-- issues section -->
    <section id="issuesContainer" class="bg-white rounded shadow-white border-0 mt-2 p-6">
        <div class="grid grid-cols-12 gap-1 max-w-[1110px]">
            <div class=" col-span-1 w-10 h-10 rounded-full bg-gray-200 items-center p-2"><img src="./assets/Aperture.png" alt=""></div>
            <div class="col-span-9">
                <h2 id="totalCount" class="font-bold">50 Issues</h2>
                <p>Track and manage your project issues</p>
            </div>
            <div class="col-span-2">
               <button id="openAvatar">
      <div class="avatar">
  <div class="w-3 bg-green-400 rounded-full">
  </div>
</div>
                Open</button>
               <button id="closedAvatar">
                 <div class="avatar">
  <div class="w-3 bg-purple-400 rounded-full">
  </div>
</div>
                Closed</button>
            </div>
        </div>
    </section>
    <!-- card section -->
     <section id="cardsContainer" class="border-0 rounded grid grid-cols-4 gap-2">
